<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Lab Mentor</title>
<style>
  :root {
    --ink: #1f2430;
    --muted: #6b7280;
    --border: #e2e5ea;
    --panel: #fafbfc;
    --accent: #3457d5;
    --accent-soft: #eef1fd;
  }
  body { font-family: system-ui, sans-serif; max-width: 680px; margin: 40px auto; padding: 0 16px; color: var(--ink); }
  h1 { font-size: 20px; margin-bottom: 4px; }
  h1 .sub { display: block; font-size: 13px; font-weight: 400; color: var(--muted); margin-top: 2px; }
  #setup, #chat { border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-top: 16px; background: #fff; }
  input, button, textarea, select { font-size: 14px; font-family: inherit; }
  #apiKey, #providerSelect { width: 100%; padding: 8px; box-sizing: border-box; margin-top: 6px; border: 1px solid var(--border); border-radius: 6px; }
  #log { min-height: 200px; max-height: 420px; overflow-y: auto; margin-bottom: 12px; }
  .msg { padding: 8px 12px; margin: 6px 0; border-radius: 8px; white-space: pre-wrap; line-height: 1.4; }
  .user { background: var(--accent-soft); }
  .assistant { background: var(--panel); border: 1px solid var(--border); }
  .tool-note { font-size: 12px; color: var(--muted); margin: -4px 0 10px 4px; }
  #inputRow { display: flex; gap: 8px; }
  #messageInput { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 6px; }
  button { padding: 8px 14px; cursor: pointer; border-radius: 6px; }
  #inputRow button { background: var(--accent); color: #fff; border: none; }
  #inputRow button:hover { opacity: 0.9; }
  small { color: var(--muted); display: block; margin-top: 4px; }

  #chatHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  #chatHeader h2 { font-size: 14px; margin: 0; color: var(--muted); }
  #newSessionBtn { background: var(--panel); border: 1px solid var(--border); font-size: 12px; padding: 6px 10px; color: var(--ink); }
  #newSessionBtn:hover { background: #f0f1f3; }

  .actionGroupLabel { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin-bottom: 5px; }
  .quickActions { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .quick-btn { background: #fff; border: 1px solid var(--border); font-size: 13px; padding: 6px 11px; color: var(--ink); }
  .quick-btn:hover { background: var(--panel); border-color: #d1d5db; }
  .quick-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .quick-btn:disabled:hover { background: #fff; }
</style>
</head>
<body>

<h1>AI Lab Mentor<span class="sub">Circuit Diagnostic AI — an engineering lab mentor for ESP32 projects</span></h1>

<div id="setup">
  <label for="providerSelect">LLM provider</label>
  <select id="providerSelect">
    <option value="gemini" selected>Google Gemini (gemini-3.5-flash)</option>
    <option value="groq">Groq (llama-3.3-70b-versatile)</option>
  </select>

  <label for="apiKey" style="margin-top:12px; display:block;">Your API key for the selected provider</label>
  <input id="apiKey" type="password" placeholder="Paste your own key here">
  <small id="keyHint">Get a free key at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a>. It stays in your browser only — never sent anywhere but Google.</small>
</div>

<div id="chat">
  <div id="chatHeader">
    <h2>Diagnostic session</h2>
    <button id="newSessionBtn" onclick="newSession()">↻ New Session</button>
  </div>

  <span class="actionGroupLabel">Quick actions</span>
  <div class="quickActions">
    <button class="quick-btn" onclick="quickAction('Help me check if my power supply can handle all my components.')">🔋 Power Budget</button>
    <button class="quick-btn" onclick="quickAction('Walk me through taking a multimeter measurement to help diagnose my issue.')">🔌 Multimeter</button>
    <button class="quick-btn" id="reportBtn" disabled onclick="quickAction('Can you generate a full diagnostic report for this session?')">📄 Generate Report</button>
    <button class="quick-btn" id="quizBtn" disabled onclick="quickAction('Quiz me on the reasoning behind this session.')">🎓 Quiz Me</button>
  </div>

  <div id="log"></div>
  <div id="inputRow">
    <input id="messageInput" type="text" placeholder="Describe your circuit issue, paste an error log, or ask a compatibility question...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
let history = [];
const log = document.getElementById("log");
const providerSelect = document.getElementById("providerSelect");
const keyHint = document.getElementById("keyHint");

const PROVIDER_HINTS = {
  gemini: 'Get a free key at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a>. It stays in your browser only — never sent anywhere but Google.',
  groq: 'Get a free key at <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a>. It stays in your browser only — never sent anywhere but Groq.',
};

providerSelect.addEventListener("change", () => {
  keyHint.innerHTML = PROVIDER_HINTS[providerSelect.value];
});

function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function addToolNote(toolNames) {
  if (!toolNames || toolNames.length === 0) return;
  const div = document.createElement("div");
  div.className = "tool-note";
  div.textContent = "🔧 used: " + toolNames.join(", ");
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function newSession() {
  history = [];
  log.innerHTML = "";
  document.getElementById("reportBtn").disabled = true;
  document.getElementById("quizBtn").disabled = true;
  document.getElementById("messageInput").focus();
}

function quickAction(text) {
  const msgInput = document.getElementById("messageInput");
  msgInput.value = text;
  send();
}

async function send() {
  const provider = providerSelect.value;
  const apiKey = document.getElementById("apiKey").value.trim();
  const msgInput = document.getElementById("messageInput");
  const message = msgInput.value.trim();

  if (!apiKey) { alert("Enter your API key for the selected provider first."); return; }
  if (!message) return;

  addMessage("user", message);
  msgInput.value = "";

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ provider, api_key: apiKey, message, history })
    });
    const data = await res.json();

    if (!res.ok) {
      addMessage("assistant", "Error: " + (data.detail || res.statusText));
      return;
    }

    addMessage("assistant", data.reply);
    addToolNote(data.tool_calls_made);
    history.push({ role: "user", content: message });
    history.push({ role: "assistant", content: data.reply });
    document.getElementById("reportBtn").disabled = false;
    document.getElementById("quizBtn").disabled = false;
  } catch (err) {
    addMessage("assistant", "Network error: " + err.message);
  }
}

document.getElementById("messageInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
