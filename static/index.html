<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Lab Mentor</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #222; }
  h1 { font-size: 20px; }
  #setup, #chat { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-top: 16px; }
  input, button, textarea, select { font-size: 14px; }
  #apiKey, #providerSelect { width: 100%; padding: 8px; box-sizing: border-box; margin-top: 6px; }
  #log { min-height: 200px; max-height: 400px; overflow-y: auto; margin-bottom: 12px; }
  .msg { padding: 8px 12px; margin: 6px 0; border-radius: 6px; white-space: pre-wrap; }
  .user { background: #eef2ff; }
  .assistant { background: #f4f4f4; }
  .tool-note { font-size: 12px; color: #888; margin: -4px 0 8px 4px; }
  #inputRow { display: flex; gap: 8px; }
  #messageInput { flex: 1; padding: 8px; }
  button { padding: 8px 14px; cursor: pointer; }
  small { color: #666; display: block; margin-top: 4px; }
  #chatHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  #chatHeader h2 { font-size: 14px; margin: 0; color: #555; }
  #newSessionBtn { background: #f4f4f4; border: 1px solid #ccc; border-radius: 6px; font-size: 12px; padding: 6px 10px; }
  #newSessionBtn:hover { background: #eaeaea; }
</style>
</head>
<body>

<h1>AI Lab Mentor — Circuit Diagnostic AI</h1>

<div id="setup">
  <label for="providerSelect">LLM provider</label>
  <select id="providerSelect">
    <option value="groq">Groq (llama-3.3-70b-versatile)</option>
    <option value="gemini">Google Gemini (gemini-3.5-flash)</option>
  </select>

  <label for="apiKey" style="margin-top:12px; display:block;">Your API key for the selected provider</label>
  <input id="apiKey" type="password" placeholder="Paste your own key here">
  <small id="keyHint">Get a free key at <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a>. It stays in your browser only — never sent anywhere but your chosen provider.</small>
</div>

<div id="chat">
  <div id="chatHeader">
    <h2>Diagnostic session</h2>
    <button id="newSessionBtn" onclick="newSession()">↻ New Session</button>
  </div>
  <div id="log"></div>
  <div id="inputRow">
    <input id="messageInput" type="text" placeholder="Describe your circuit issue, paste an error log, or ask a compatibility question...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
let history = [];
const log = document.getElementById("log");
const providerSelect = document.getElementById("providerSelect");
const keyHint = document.getElementById("keyHint");

const PROVIDER_HINTS = {
  groq: 'Get a free key at <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a>. It stays in your browser only — never sent anywhere but Groq.',
  gemini: 'Get a free key at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a>. It stays in your browser only — never sent anywhere but Google.',
};

providerSelect.addEventListener("change", () => {
  keyHint.innerHTML = PROVIDER_HINTS[providerSelect.value];
});

function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function addToolNote(toolNames) {
  if (!toolNames || toolNames.length === 0) return;
  const div = document.createElement("div");
  div.className = "tool-note";
  div.textContent = "🔧 used: " + toolNames.join(", ");
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function newSession() {
  history = [];
  log.innerHTML = "";
  document.getElementById("messageInput").focus();
}

async function send() {
  const provider = providerSelect.value;
  const apiKey = document.getElementById("apiKey").value.trim();
  const msgInput = document.getElementById("messageInput");
  const message = msgInput.value.trim();

  if (!apiKey) { alert("Enter your API key for the selected provider first."); return; }
  if (!message) return;

  addMessage("user", message);
  msgInput.value = "";

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ provider, api_key: apiKey, message, history })
    });
    const data = await res.json();

    if (!res.ok) {
      addMessage("assistant", "Error: " + (data.detail || res.statusText));
      return;
    }

    addMessage("assistant", data.reply);
    addToolNote(data.tool_calls_made);
    history.push({ role: "user", content: message });
    history.push({ role: "assistant", content: data.reply });
  } catch (err) {
    addMessage("assistant", "Network error: " + err.message);
  }
}

document.getElementById("messageInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
